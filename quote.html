<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get a Quote - SecureAuto Insurance</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="faq.html">FAQ</a>
        <a href="about.html">About</a>
        <a href="quote.html">Get a Quote</a>
    </nav>
    <header>
        <h1>Get an Auto Insurance Quote</h1>
    </header>
    <section>
        <form id="quoteForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="car">Car Model:</label>
            <input type="text" id="car" name="car" required>
            <label for="year">Year:</label>
            <input type="number" id="year" name="year" required>
            <label for="coverage">Coverage Type:</label>
            <select id="coverage" name="coverage">
                <option value="basic">Basic</option>
                <option value="standard">Standard</option>
                <option value="premium">Premium</option>
            </select>
            <button type="submit">Get Quote</button>
        </form>
        <div id="quoteResult"></div>
    </section>
    <footer>
        <p>&copy; 2026 SecureAuto Insurance. All rights reserved.</p>
    </footer>
    <script src="js/quote.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
